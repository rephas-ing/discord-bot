name: Build & Publish

on:
  push:
    branches:
      - root

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4

        with:
          java-version: 21
          distribution: temurin

      - name: Gradle (Setup)
        uses: gradle/actions/setup-gradle@v5

        with:
          dependency-graph: generate-and-submit

      - name: Gradle (Build)
        run: "./gradlew build"

      - name: Upload artifacts (Distribution)
        uses: actions/upload-artifact@v4

        with:
          name: JARs
          path: build/distributions/*.tar

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1

        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: docker build -t ghcr.io/rephas-ing/discord-bot:latest -t ghcr.io/rephas-ing/discord-bot:${GITHUB_SHA} .
      - run: docker push ghcr.io/rephas-ing/discord-bot:${GITHUB_SHA}
      - run: docker push ghcr.io/rephas-ing/discord-bot:latest
